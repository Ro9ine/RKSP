services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
      POSTGRES_DB: workflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://workflow:workflow@db:5432/workflow
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGINS: http://localhost:5173,http://localhost:80,http://localhost
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      API_UPSTREAM: http://api:8000
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
